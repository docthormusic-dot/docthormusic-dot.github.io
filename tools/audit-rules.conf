# Asset audit rules — read by tools/audit-assets.sh
# Lines starting with # are comments.

# File extensions that must never be deployed (case-insensitive, comma-separated)
BLOCKED_EXTENSIONS=psd,ai,eps,sketch,fig,xcf,tif,tiff,raw,cr2,nef,arw,dng,mov,prores,wav,aif,aiff,flac,zip,rar,7z,tar,gz,tgz,bak,tmp

# Filename substrings that indicate a private/master file (case-insensitive)
BLOCKED_NAME_PATTERNS=original,master,source,backup,full-res,unwatermarked,final-final,_raw

# Maximum size for any single deployed file, in MB
MAX_FILE_MB=15

# Directories (repo-relative) where media files are expected.
# Media found outside these fails the audit.
APPROVED_MEDIA_DIRS=assets
