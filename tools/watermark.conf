# Opt-in watermarking — read by tools/process-images.py
# Watermarks are baked into the public derivative at build time.
# Unwatermarked originals live OUTSIDE this repo (01_Website/02_Working/…).
#
# Never list here: the logo, heading graphics, UI assets, or press-kit
# files licensed for editorial use.

WATERMARK_TEXT=© DOCTHOR
OPACITY=0.14
SCALE=0.05
POSITION=diagonal-tile
# POSITION options: diagonal-tile | bottom-right | center

# Repo-relative image paths to watermark, one per line, after "TARGETS:".
# Empty list = watermarking disabled (current default).
TARGETS:
